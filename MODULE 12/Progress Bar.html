<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>

<body>

<div class="container">
  <h2>Task Completion Indicator</h2>

  <p>
    A progress bar can be used to display how much of a task has been finished.
    The outer container uses the <code>.progress</code> class, while the inner
    element uses the <code>.progress-bar</code> class. The width value controls
    the amount of progress shown.
  </p>

  <div class="progress">
    <div class="progress-bar" style="width:70%">70% Complete</div>
  </div>
</div>

</body>
</html>
