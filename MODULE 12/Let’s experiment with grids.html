<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Example</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>

<body>
  <div class="container">
    <h1>Welcome Learners!</h1>
    <p>Adjust the browser size to observe the responsive layout.</p>

    <div class="row">
      <!-- Medium and Extra Small Screen Sizes -->
      <div class="col-md-8 col-xs-4" style="background-color: coral; border: 1px solid black;">
        First Panel
      </div>
      <div class="col-md-12 col-md-5" style="background-color: honeydew;">
        Second Panel
      </div>
    </div>

    <div class="row">
      <!-- Large, Medium, and Extra Small Screen Sizes -->
      <div class="col-md-12 col-lg-6" style="background-color: mistyrose;">
        Content Area A
      </div>
      <div class="col-xs-6 col-md-2" style="background-color: gainsboro;">
        Content Area B
      </div>
    </div>

    <div class="row" style="background-color: aliceblue;">
      <!-- Extra Small Screen Size -->
      <div class="col-xs-6">
        Block One
      </div>
      <div class="col-xs-6">
        Block Two
      </div>
    </div>
  </div>
</body>
</html>
