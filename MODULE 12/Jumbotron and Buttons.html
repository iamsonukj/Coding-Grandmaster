<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap Jumbotron</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>

<body style="text-align:center;">

    <div class="jumbotron jumbotron-fluid">
        <div class="container">
            <h1 style="color:teal;">
                LearnTech
            </h1>

            <p>LearnTech makes mastering programming simple and enjoyable.</p>
        </div>
    </div>

    <div class="container mt-3">

        <h2>Action Buttons</h2>

        <button type="button" class="btn btn-primary">Start</button>
        <button type="button" class="btn btn-secondary">Pause</button>
        <button type="button" class="btn btn-success">Complete</button>
        <button type="button" class="btn btn-warning">Review</button>
        <button type="button" class="btn btn-danger">Remove</button>

    </div>

</body>
</html>
