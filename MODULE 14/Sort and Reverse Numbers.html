<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Array Sorting</title>
</head>

<body>

<h2>JavaScript Array Sorting Example</h2>

<p>Click the buttons to sort the numbers in different orders.</p>

<button onclick="sortAscending()">Sort Ascending</button>
<button onclick="sortDescending()">Sort Descending</button>

<p id="output"></p>

<script>

var numbers = [45, 12, 89, 3, 67, 21];

document.getElementById("output").innerHTML = numbers;

// Ascending order
function sortAscending() {
    numbers.sort(function(a, b) {
        return a - b;
    });

    document.getElementById("output").innerHTML = numbers;
}

// Descending order
function sortDescending() {
    numbers.sort(function(a, b) {
        return b - a;
    });

    document.getElementById("output").innerHTML = numbers;
}

</script>

</body>
</html>
