<!DOCTYPE html>
<html>
<head>
  <title>My Space Cards</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f4ff;
      padding: 30px;
      text-align: center;
    }

    h1 { color: #2c7be5; }

    p { color: #555; }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
    }

    .card {
      background: white;
      border: 3px solid #2c7be5;
      border-radius: 12px;
      padding: 20px;
      width: 200px;
    }

    .planet-name {
      font-size: 22px;
      font-weight: bold;
      color: #333;
    }

    .planet-fact {
      color: #666;
      margin-top: 10px;
      font-size: 14px;
    }

    button {
      background: #2c7be5;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>My Space Cards</h1>
  <p>Use a JavaScript class to generate planet information cards!</p>

  <button onclick="displayPlanets()">Load Planets</button>

  <div class="cards">
    <div id="card1"></div>
    <div id="card2"></div>
    <div id="card3"></div>
  </div>

  <script>

    class SpaceObject {
      constructor(name, description) {
        this.name = name;
        this.description = description;
      }

      getInfo() {
        return this.name + ": " + this.description;
      }
    }

    function displayPlanets() {

      let planet1 = new SpaceObject("Mercury", "Closest planet to the Sun");
      let planet2 = new SpaceObject("Venus", "Hottest planet in the solar system");
      let planet3 = new SpaceObject("Neptune", "Farthest known planet from the Sun");

      document.getElementById("card1").innerHTML =
        "<div class='card'><div class='planet-name'>" + planet1.name + "</div>" +
        "<div class='planet-fact'>" + planet1.getInfo() + "</div></div>";

      document.getElementById("card2").innerHTML =
        "<div class='card'><div class='planet-name'>" + planet2.name + "</div>" +
        "<div class='planet-fact'>" + planet2.getInfo() + "</div></div>";

      document.getElementById("card3").innerHTML =
        "<div class='card'><div class='planet-name'>" + planet3.name + "</div>" +
        "<div class='planet-fact'>" + planet3.getInfo() + "</div></div>";

    }

  </script>

</body>
</html>
