<!DOCTYPE html>
<html>
<body>

<h2>JavaScript String Conversion Method</h2>

<p>The String() method converts numbers into text (strings).</p>

<p id="sum_result"></p>
<p id="concat_result"></p>

<script>

var a = 35;
var b = 65;

// Numeric addition
document.getElementById("sum_result").innerHTML = a + b;

// String conversion (concatenation instead of addition)
document.getElementById("concat_result").innerHTML =
String(a) + String(b);

</script>

</body>
</html>
