<!DOCTYPE html>
<html>
<head>
  <title>My Explorer Card</title>
  <style>

    /* Typography — styling for the entire page */
    body {
      background-color: darkgreen;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* Typography + Text Shadow — large title with a shadow effect */
    .explorer-name {
      font-size: 60px;
      font-weight: bold;
      color: gold;
      text-shadow: 3px 3px darkorange;
    }

    /* Typography + Text Transform — slogan displayed in capitalized text */
    .slogan {
      font-style: italic;
      color: lightyellow;
      text-transform: capitalize;
    }

    /* Text Transform + Text Decoration — headings in uppercase and underlined */
    .label {
      text-transform: uppercase;
      text-decoration: underline;
      color: lightgreen;
    }

    /* Typography — skills highlighted in bold */
    .skill {
      font-weight: bold;
      color: cyan;
    }

    /* Text Decoration — challenges shown with a strike-through effect */
    .challenge {
      text-decoration: line-through;
      color: silver;
    }

    /* Transform — award badge slightly rotated */
    .badge {
      font-size: 28px;
      font-weight: bold;
      color: gold;
      transform: rotate(15deg);
    }

    /* Typography — footer styling */
    .created-by {
      color: lightgreen;
      font-style: italic;
    }

  </style>
</head>
<body>

  <h1 class="explorer-name">Adventure Alex</h1>
  <p class="slogan">the bravest explorer of hidden lands</p>

  <h2 class="label">special skills</h2>
  <p class="skill">Can navigate through dense forests</p>
  <p class="skill">Can discover hidden treasures</p>

  <h2 class="label">challenges</h2>
  <p class="challenge">Getting lost without a map</p>
  <p class="challenge">Crossing stormy rivers</p>

  <p class="badge">Master Explorer</p>

  <p class="created-by">Designed by ___________</p>

</body>
</html>
