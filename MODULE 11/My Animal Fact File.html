<!DOCTYPE html>
<html>
<head>
  <title>My Plant Fact Card</title>
  <style>

    /* Page background — sets the colour and font for the entire page */
    body {
      background-color: darkolivegreen;
      font-family: Arial, sans-serif;
    }

    /* Box Model — controls the size and spacing of the card */
    .fact-card {
      background-color: lightgoldenrodyellow;
      color: darkslategray;
      width: 260px;
      padding: 25px;
      border: 4px solid olive;
      margin: 30px;
    }

    /* Plant name — highlighted with a green colour */
    .plant-name {
      color: olive;
      font-size: 22px;
    }

    /* Information rows */
    .detail {
      color: darkslategray;
    }

    /* Interesting fact — styled differently to attract attention */
    .interesting-fact {
      color: darkorange;
      font-style: italic;
    }

  </style>
</head>
<body>

  <div class="fact-card">
    <h2 class="plant-name">Sunflower</h2>
    <p class="detail">Type: Flowering Plant</p>
    <p class="detail">Found in: Gardens and fields around the world</p>
    <p class="detail">Needs: Sunlight, water, and nutrient-rich soil</p>
    <p class="interesting-fact">Interesting Fact: Young sunflowers turn their heads to follow the sun during the day!</p>
  </div>

</body>
</html>
