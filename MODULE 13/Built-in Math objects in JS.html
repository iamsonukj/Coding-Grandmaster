<html>
<head>
    <title>JavaScript Math Object Methods</title>
</head>

<body>
    <script type="text/javascript">

    var result;

    result = Math.abs(-25);
    document.write("Absolute Value : " + result + "<br>");

    result = Math.acos(0.5);
    document.write("Inverse Cosine Value : " + result + "<br>");

    result = Math.asin(0.7);
    document.write("Inverse Sine Value : " + result + "<br>");

    result = Math.atan(1);
    document.write("Inverse Tangent Value : " + result + "<br>");

    </script>
</body>
</html>
