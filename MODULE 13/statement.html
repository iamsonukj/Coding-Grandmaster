<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Operations</h2>

<p>
A <b>JavaScript script</b> consists of multiple
<b>instructions</b> that the browser executes one by one.
</p>

<p id="output"></p>

<script>
var a, b, c; // Instruction 1

a = 10; // Instruction 2
b = 15; // Instruction 3
c = a + b; // Instruction 4

document.getElementById("output").innerHTML =
"The result of c is " + c + ".";
</script>

</body>
</html>
