<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Loop Example</h2>

<p id="output"></p>

<script>
    var colors = ["Red", "Blue", "Green",
                  "Yellow", "Purple", "Orange"];

    var displayText = "";
    var index;

    for (index = 0; index < colors.length; index++) {
        displayText += colors[index] + "<br>";
    }

    document.getElementById("output").innerHTML = displayText;
</script>

</body>
</html>
