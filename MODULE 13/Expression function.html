<!DOCTYPE html>
<html>

<head>
    <title>Function Declaration</title>
</head>

<body>
    <center>
        <h1 style="color:blue">Tech Learning Hub</h1>
        <h3>Function Expression Example</h3>

        <script>
            var multiplyNumbers = function(x, y) {
                return x * y;
            };

            document.write(multiplyNumbers(6, 7));
        </script>
    </center>
</body>

</html>
