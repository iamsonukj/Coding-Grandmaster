<!DOCTYPE html>
<html>
<body>

<h1>JavaScript Arithmetic</h1>
<p>Addition of Two Values</p>
<p id="output"></p>

<script>
    var value1 = 8;
    var value2 = 12;
    var total = value1 + value2;

    document.getElementById("output").innerHTML =
    "The calculated result is: " + total;
</script>

</body>
</html>
