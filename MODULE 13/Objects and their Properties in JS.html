<!DOCTYPE html>
<html>
  <body>

    <h2>JavaScript Objects and Properties</h2>

    <p>There are two common ways to access object properties</p>

    <p>You can use dot notation (.property) or bracket notation ["property"].</p>

    <p id="output"></p>

    <script>
    // Create an object
    var user = {
      firstName: "I",
      age: 20
    };

    // Display object values
    document.getElementById("output").innerHTML =
      user.firstName + " am " + user.age + " years old";
    </script>

  </body>
</html>
