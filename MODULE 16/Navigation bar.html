<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .navbar {
            overflow: hidden;
            background-color: #333;
        }

        .navbar a {
            float: left;
            color: #00ffcc;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .navbar a:hover {
            background-color: #e0e0e0;
            color: #000;
        }

        .navbar a.active {
            background-color: #ffdd57;
            color: #000;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a class="active" href="#home">Home</a>
        <a href="#">About Us</a>
        <a href="#">Gallery</a>
        <a href="#">Contact Us</a>
    </div>

</body>
</html>
