<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Student Registration Form</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Student Registration Form</h1>

    <form>
      <label>Student Name</label><br>
      <input type="text" id="studentName"><br><br>

      <label>School Email</label><br>
      <input type="text" id="schoolEmail"><br><br>

      <label>Student ID (Hidden for Privacy)</label><br>
      <input type="password" id="studentId"><br><br>

      <label>Choose Your Grade Group</label><br>
      <input type="radio" id="junior" name="grade" value="Junior">Junior<br>
      <input type="radio" id="senior" name="grade" value="Senior">Senior<br><br>

      <label>Select Your Favorite Subjects</label><br>
      <input type="checkbox" id="subject1" value="Science">Science<br>
      <input type="checkbox" id="subject2" value="Mathematics">Mathematics<br><br>

      <input type="submit" value="Register">
    </form>

  </body>
</html>
